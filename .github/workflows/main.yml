name: Python Project CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Позволит запускать вручную для тестов

jobs:
  test-and-log-check:
    runs-on: ubuntu-latest

    steps:
      - name: Копирование кода
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          # Если есть requirements.txt, раскомментируйте строку ниже:
          # pip install -r requirements.txt

      - name: Запуск тестов
        working-directory: ./folder
        run: |
          python test_logic.py

      - name: Проверка работы программы (Dry run)
        working-directory: ./folder
        run: |
          echo "25" | python main.py
          if [ -f app.log ]; then 
            echo "Лог-файл создан!"
          else 
            echo "Ошибка: Лог-файл не найден"
            exit 1
          fi