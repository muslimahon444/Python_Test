name: Python Project CI/CD
on :
push:
 branches: [main]
pull_request:
 branches : [main]
jobs:
 test-and-log-chekck:
 runs-on: ubuntu-latest

 steps:
 -name: Копирование кода 
 uses: actions/setup-python@v3

 -name : Устоновка Python
 uses: actions/setup-python@v4
with:
  python-version: '3.9'

  -name: Устоновка Зависимостей
  run:
   python -m pip install --upgrade pip  

  -name: Запуск Тесстов

  run: python test_logic.py
  -name: Проверка работы программы (Dry run)
  run: if [-fapp.log]; then echo "Лог -файл создан"; else exit 1; 
